<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL MAKER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#5BC8F5;
  --dark:#1a1a2e;
  --yellow:#FFD600;
  --yellow2:#F9A825;
  --pink:#FF4DA6;
  --pink2:#C2185B;
  --green:#4CAF50;
  --green2:#388E3C;
  --teal:#00BCD4;
  --teal2:#00838F;
  --purple:#9C27B0;
  --purple2:#6A1B9A;
  --pf:'Press Start 2P',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--sky);font-family:var(--pf);font-size:8px}

/* CLOUDS */
.cloud-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.cloud{position:absolute;background:white}
.cloud::before,.cloud::after{content:'';position:absolute;background:white}
.cl1{width:80px;height:28px;top:8%;left:4%;border-radius:0 0 0 0;
  clip-path:polygon(10px 0,70px 0,80px 10px,80px 20px,70px 28px,10px 28px,0 20px,0 10px);
  animation:float1 20s ease-in-out infinite}
.cl2{width:60px;height:22px;top:15%;right:8%;
  clip-path:polygon(8px 0,52px 0,60px 8px,60px 14px,52px 22px,8px 22px,0 14px,0 8px);
  animation:float2 25s ease-in-out infinite}
.cl3{width:70px;height:24px;top:5%;left:42%;
  clip-path:polygon(9px 0,61px 0,70px 9px,70px 15px,61px 24px,9px 24px,0 15px,0 9px);
  animation:float3 18s ease-in-out infinite}
.cl4{width:50px;height:18px;top:20%;left:22%;
  clip-path:polygon(6px 0,44px 0,50px 6px,50px 12px,44px 18px,6px 18px,0 12px,0 6px);
  animation:float1 22s ease-in-out infinite 5s}
.cl5{width:65px;height:22px;top:10%;right:30%;
  clip-path:polygon(8px 0,57px 0,65px 8px,65px 14px,57px 22px,8px 22px,0 14px,0 8px);
  animation:float2 28s ease-in-out infinite 3s}
@keyframes float1{0%,100%{transform:translateX(0) translateY(0)}33%{transform:translateX(12px) translateY(-4px)}66%{transform:translateX(-6px) translateY(3px)}}
@keyframes float2{0%,100%{transform:translateX(0) translateY(0)}40%{transform:translateX(-10px) translateY(5px)}70%{transform:translateX(8px) translateY(-3px)}}
@keyframes float3{0%,100%{transform:translateX(0) translateY(0)}50%{transform:translateX(15px) translateY(-6px)}}

/* STARS (twinkle on start screen) */
.star{position:absolute;background:white;width:4px;height:4px;animation:twinkle 2s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}

/* ===== SCREENS ===== */
#start-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:0}
#app-screen{position:fixed;inset:0;display:none;flex-direction:column;z-index:10}

/* ===== START SCREEN ===== */
.title-wrap{text-align:center;margin-bottom:28px}
.game-title{
  font-size:clamp(20px,5vw,40px);color:var(--yellow);
  text-shadow:4px 4px 0 var(--yellow2),7px 7px 0 rgba(0,0,0,0.5);
  letter-spacing:3px;display:block;
  animation:titleBounce 2.4s ease-in-out infinite;
}
@keyframes titleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.subtitle{font-size:7px;color:rgba(255,255,255,0.9);text-shadow:2px 2px 0 rgba(0,0,0,0.5);margin-top:10px;letter-spacing:2px;display:block;animation:blink 1.2s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.menu-box{
  background:rgba(10,10,30,0.88);
  border:4px solid var(--yellow);
  box-shadow:6px 6px 0 #000, inset 0 0 0 2px rgba(255,255,255,0.05);
  padding:28px 32px;min-width:280px;max-width:340px;width:90%;
  display:flex;flex-direction:column;gap:10px;align-items:center;
}

.px-btn{
  font-family:var(--pf);cursor:pointer;border:none;text-transform:uppercase;
  letter-spacing:1px;transition:transform .08s,filter .08s;
  width:100%;text-align:center;display:block;
}
.px-btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.px-btn:active{transform:translateY(3px)!important;filter:brightness(0.9)}

.btn-lg{font-size:9px;padding:12px 20px}
.btn-md{font-size:8px;padding:9px 16px}
.btn-sm{font-size:7px;padding:7px 12px}

.btn-green{background:var(--green);color:#fff;box-shadow:0 5px 0 var(--green2),5px 5px 0 #000;text-shadow:1px 1px 0 rgba(0,0,0,0.4)}
.btn-pink{background:var(--pink);color:#fff;box-shadow:0 5px 0 var(--pink2),5px 5px 0 #000;text-shadow:1px 1px 0 rgba(0,0,0,0.4)}
.btn-yellow{background:var(--yellow);color:#333;box-shadow:0 5px 0 var(--yellow2),5px 5px 0 #000;text-shadow:1px 1px 0 rgba(0,0,0,0.2)}
.btn-teal{background:var(--teal);color:#fff;box-shadow:0 5px 0 var(--teal2),5px 5px 0 #000;text-shadow:1px 1px 0 rgba(0,0,0,0.4)}
.btn-purple{background:var(--purple);color:#fff;box-shadow:0 5px 0 var(--purple2),5px 5px 0 #000;text-shadow:1px 1px 0 rgba(0,0,0,0.4)}
.btn-dark{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);box-shadow:0 3px 0 rgba(0,0,0,0.5),3px 3px 0 #000;border:1px solid rgba(255,255,255,0.2)}

.menu-sep{width:100%;height:2px;background:rgba(255,255,255,0.15);margin:2px 0}
.menu-label{color:rgba(255,255,255,0.4);font-size:6px;letter-spacing:3px;margin-bottom:0px}

/* Load slots */
.slots-panel{display:none;flex-direction:column;gap:5px;width:100%}
.slot-row{
  background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.15);
  color:white;font-family:var(--pf);font-size:6px;padding:8px 10px;
  cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  transition:background .1s;
}
.slot-row:hover{background:rgba(255,255,255,0.18);border-color:var(--yellow)}
.slot-row.empty{opacity:.45;cursor:not-allowed}
.slot-tag{font-size:5px;color:var(--yellow);background:rgba(0,0,0,0.5);padding:2px 5px}

/* ===== APP SCREEN ===== */
.topbar{
  background:var(--dark);border-bottom:4px solid var(--yellow);
  display:flex;align-items:center;gap:5px;padding:5px 8px;flex-shrink:0;flex-wrap:wrap;
}
.topbar-logo{color:var(--yellow);font-size:9px;text-shadow:2px 2px 0 #000;margin-right:4px;white-space:nowrap}
.tb-sep{width:2px;height:22px;background:rgba(255,255,255,0.12);margin:0 2px;flex-shrink:0}
.tb-btn{font-family:var(--pf);font-size:6px;cursor:pointer;border:none;padding:5px 8px;transition:transform .07s,filter .07s;white-space:nowrap;flex-shrink:0}
.tb-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.tb-btn:active{transform:translateY(2px)}
.size-in{background:#0a0a1a;border:2px solid rgba(255,255,255,0.25);color:var(--yellow);font-family:var(--pf);font-size:6px;padding:3px 5px;width:38px;text-align:center}
.coord-badge{font-family:var(--pf);font-size:6px;color:rgba(255,255,255,0.4);margin-left:auto;white-space:nowrap}

.main-area{display:flex;flex:1;overflow:hidden;min-height:0}

/* SIDEBAR */
.sidebar{
  background:var(--dark);border-right:4px solid var(--yellow);
  width:76px;flex-shrink:0;display:flex;flex-direction:column;gap:3px;padding:7px 5px;overflow-y:auto;
}
.side-label{color:var(--yellow);font-size:5px;letter-spacing:2px;text-align:center;margin:4px 0 2px;opacity:.8}
.side-btn{
  font-family:var(--pf);font-size:5px;cursor:pointer;border:none;
  padding:7px 3px;text-align:center;transition:transform .07s,filter .07s;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.side-btn .ico{font-size:13px;line-height:1}
.side-btn:hover{filter:brightness(1.2);transform:translateY(-1px)}
.side-btn:active{transform:scale(0.93)}
.side-btn.active{outline:3px solid #fff;outline-offset:1px}
.side-sep{height:2px;background:rgba(255,255,255,0.12);margin:3px 0;flex-shrink:0}
.zoom-row{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:2px}
.zoom-val{font-size:7px;color:var(--yellow);min-width:24px;text-align:center}
.zoom-mini{font-family:var(--pf);font-size:8px;cursor:pointer;border:none;padding:4px 7px;line-height:1}

/* CANVAS ZONE */
.canvas-zone{
  flex:1;overflow:auto;
  background:repeating-linear-gradient(45deg,rgba(0,0,0,0.04) 0,rgba(0,0,0,0.04) 2px,transparent 2px,transparent 12px);
  padding:16px;display:flex;align-items:flex-start;justify-content:flex-start;
}
.canvas-wrap{position:relative;display:inline-block;flex-shrink:0}
#pixel-canvas{image-rendering:pixelated;display:block;cursor:crosshair}
.scanline{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px)}

/* COLOR PANEL */
.cpanel{
  background:var(--dark);border-left:4px solid var(--yellow);
  width:128px;flex-shrink:0;display:flex;flex-direction:column;gap:4px;padding:7px 6px;overflow-y:auto;
}
.color-row{display:flex;justify-content:center;align-items:flex-end;gap:0;margin-bottom:4px}
.fg-sw{width:34px;height:34px;border:3px solid #fff;cursor:pointer;box-shadow:3px 3px 0 #000;position:relative;z-index:2}
.bg-sw{width:22px;height:22px;border:3px solid rgba(255,255,255,0.45);cursor:pointer;box-shadow:2px 2px 0 #000;margin-bottom:-6px;margin-right:-10px;position:relative;z-index:1}
.hex-in{background:#0a0a1a;border:2px solid var(--yellow);color:var(--yellow);font-family:var(--pf);font-size:6px;padding:4px 5px;width:100%}
.hex-in:focus{outline:none;border-color:#fff}
input[type=color]{width:100%;height:26px;border:2px solid var(--yellow);background:none;cursor:pointer;padding:1px}
.pal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.pc{aspect-ratio:1;border:2px solid rgba(0,0,0,0.5);cursor:pointer;transition:transform .07s;image-rendering:pixelated}
.pc:hover{transform:scale(1.25);z-index:1;position:relative;border-color:#fff}
.pc.sel{outline:2px solid white;outline-offset:1px}

/* TOAST */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--dark);border:3px solid var(--yellow);color:var(--yellow);
  font-family:var(--pf);font-size:7px;padding:9px 18px;
  z-index:999;transition:transform .3s;pointer-events:none;box-shadow:4px 4px 0 #000;
  white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* SAVE MODAL */
#save-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;align-items:center;justify-content:center}
.modal-box{background:var(--dark);border:4px solid var(--yellow);padding:22px 28px;min-width:290px;box-shadow:7px 7px 0 #000;display:flex;flex-direction:column;gap:8px;align-items:center}
.modal-title{color:var(--yellow);font-size:10px;text-shadow:2px 2px 0 #000;margin-bottom:4px;text-align:center}
.modal-slot{
  background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.18);
  color:#fff;font-family:var(--pf);font-size:6px;padding:9px 12px;
  cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  width:100%;transition:background .1s;
}
.modal-slot:hover{background:rgba(255,255,255,0.2);border-color:var(--yellow)}
.modal-slot-tag{font-size:5px;color:var(--yellow);background:rgba(0,0,0,0.5);padding:2px 6px}
</style>
</head>
<body>

<!-- CLOUDS -->
<div class="cloud-layer">
  <div class="cloud cl1"></div>
  <div class="cloud cl2"></div>
  <div class="cloud cl3"></div>
  <div class="cloud cl4"></div>
  <div class="cloud cl5"></div>
</div>

<!-- TOAST -->
<div id="toast">SAVED!</div>

<!-- SAVE MODAL -->
<div id="save-modal">
  <div class="modal-box">
    <div class="modal-title">💾 SAVE STATE</div>
    <div id="modal-slots" style="display:flex;flex-direction:column;gap:6px;width:100%"></div>
    <button class="px-btn btn-pink btn-sm" style="margin-top:4px;width:100%" onclick="closeSaveModal()">✕ CANCEL</button>
  </div>
</div>

<!-- ===== START SCREEN ===== -->
<div id="start-screen">
  <div class="title-wrap">
    <span class="game-title">✦ PIXEL MAKER ✦</span>
    <span class="subtitle">► PRESS START ◄</span>
  </div>
  <div class="menu-box">
    <div class="menu-label">— MAIN MENU —</div>
    <button class="px-btn btn-green btn-lg" onclick="newGame()">▶ NEW CANVAS</button>
    <button class="px-btn btn-pink btn-md" onclick="toggleLoadSlots(this)">💾 LOAD STATE</button>
    <div class="slots-panel" id="load-slots"></div>
    <div class="menu-sep"></div>
    <button class="px-btn btn-teal btn-sm" onclick="triggerImport()">📂 IMPORT IMAGE</button>
    <button class="px-btn btn-dark btn-sm" onclick="showHowTo()">? HOW TO PLAY</button>
    <input type="file" id="import-file" accept="image/*" style="display:none" onchange="importImage(event)">
  </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div id="app-screen">
  <div class="topbar">
    <span class="topbar-logo">✦ PIXEL MAKER</span>
    <div class="tb-sep"></div>
    <span style="color:rgba(255,255,255,0.35);font-size:5px">W</span>
    <input class="size-in" id="inp-w" value="16" type="number" min="4" max="128">
    <span style="color:rgba(255,255,255,0.35);font-size:5px">H</span>
    <input class="size-in" id="inp-h" value="16" type="number" min="4" max="128">
    <button class="tb-btn btn-teal" onclick="resizeCanvas()">RESIZE</button>
    <div class="tb-sep"></div>
    <button class="tb-btn btn-yellow" onclick="undoAction()">◀ UNDO</button>
    <button class="tb-btn btn-yellow" onclick="redoAction()">REDO ▶</button>
    <div class="tb-sep"></div>
    <button class="tb-btn btn-pink" onclick="openSaveModal()">💾 SAVE</button>
    <button class="tb-btn btn-green" onclick="exportPNG()">↓ PNG</button>
    <button class="tb-btn btn-purple" onclick="goToMenu()">⌂ MENU</button>
    <span class="coord-badge" id="coord-lbl">X:— Y:—</span>
  </div>

  <div class="main-area">
    <!-- TOOLS -->
    <div class="sidebar">
      <div class="side-label">TOOLS</div>
      <button class="side-btn btn-green active" data-tool="draw" onclick="setTool('draw',this)"><span class="ico">✏</span>DRAW</button>
      <button class="side-btn btn-yellow" data-tool="eraser" onclick="setTool('eraser',this)"><span class="ico">⬜</span>ERASE</button>
      <button class="side-btn btn-pink" data-tool="fill" onclick="setTool('fill',this)"><span class="ico">🪣</span>FILL</button>
      <button class="side-btn btn-teal" data-tool="eyedrop" onclick="setTool('eyedrop',this)"><span class="ico">💉</span>PICK</button>
      <div class="side-sep"></div>
      <div class="side-label">MIRROR</div>
      <button class="side-btn btn-purple" id="mh-btn" onclick="toggleMirror('h')"><span class="ico">↔</span>H-FLIP</button>
      <button class="side-btn btn-purple" id="mv-btn" onclick="toggleMirror('v')"><span class="ico">↕</span>V-FLIP</button>
      <div class="side-sep"></div>
      <div class="side-label">ZOOM</div>
      <div class="zoom-row">
        <button class="zoom-mini btn-teal" onclick="changeZoom(1)">+</button>
        <span class="zoom-val" id="zoom-lbl">×8</span>
        <button class="zoom-mini btn-teal" onclick="changeZoom(-1)">−</button>
      </div>
      <div class="side-sep"></div>
      <button class="side-btn btn-dark" onclick="clearCanvas()"><span class="ico">🗑</span>CLEAR</button>
    </div>

    <!-- CANVAS -->
    <div class="canvas-zone" id="canvas-zone">
      <div class="canvas-wrap">
        <canvas id="pixel-canvas"></canvas>
        <div class="scanline"></div>
      </div>
    </div>

    <!-- COLORS -->
    <div class="cpanel">
      <div class="side-label">COLOR</div>
      <div class="color-row">
        <div class="bg-sw" id="bg-sw" onclick="swapColors()" title="Secondary (right-click)"></div>
        <div class="fg-sw" id="fg-sw" onclick="document.getElementById('cwheel').click()" title="Click to open color picker"></div>
      </div>
      <input type="color" id="cwheel" value="#FF4DA6" oninput="fromWheel(this.value)">
      <input class="hex-in" id="hex-in" value="#FF4DA6" maxlength="7" placeholder="#RRGGBB" onchange="fromHex(this.value)">
      <div class="side-sep"></div>
      <div class="side-label">PALETTE</div>
      <div class="pal-grid" id="pal-grid"></div>
      <button class="px-btn btn-teal btn-sm" style="margin-top:4px" onclick="addToPalette()">+ ADD COLOR</button>
    </div>
  </div>
</div>

<script>
/* ===== STATE ===== */
const PALETTE=[
  '#000000','#FFFFFF','#FF4DA6','#FFD600','#5BC8F5','#4CAF50',
  '#9C27B0','#FF5722','#00BCD4','#8BC34A','#F44336','#2196F3',
  '#FF9800','#673AB7','#009688','#795548',
  '#FFCDD2','#C8E6C9','#BBDEFB','#FFF9C4',
  '#E91E63','#3F51B5','#CDDC39','#FF6F00',
  '#1a1a2e','#16213e','#0f3460','#533483',
  '#FF8A80','#B9F6CA','#80D8FF','#FFD180'
];
const ZOOMS=[4,6,8,10,12,16,20,24,32];
let zIdx=2,cellSize=ZOOMS[zIdx];
let gW=16,gH=16;
let tool='draw',pColor='#FF4DA6',sColor='#FFFFFF';
let pixels=[],isDown=false,mirrorH=false,mirrorV=false;
let hist=[],redo=[];

const canvas=document.getElementById('pixel-canvas');
const ctx=canvas.getContext('2d');

/* ===== PIXEL OPS ===== */
function initPx(){pixels=Array.from({length:gH},()=>Array(gW).fill(null));}
function saveH(){hist.push(JSON.stringify(pixels));if(hist.length>60)hist.shift();redo=[];}
function undoAction(){if(!hist.length)return;redo.push(JSON.stringify(pixels));pixels=JSON.parse(hist.pop());drawAll();}
function redoAction(){if(!redo.length)return;hist.push(JSON.stringify(pixels));pixels=JSON.parse(redo.pop());drawAll();}

function setupCanvas(){
  canvas.width=gW*cellSize;canvas.height=gH*cellSize;
  canvas.style.width=gW*cellSize+'px';canvas.style.height=gH*cellSize+'px';
  drawAll();
}

function drawAll(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<gH;y++){
    for(let x=0;x<gW;x++){
      if(pixels[y][x]){ctx.fillStyle=pixels[y][x];}
      else{ctx.fillStyle=(x+y)%2===0?'#1a2a4a':'#142038';}
      ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize);
    }
  }
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=.5;
  for(let x=0;x<=gW;x++){ctx.beginPath();ctx.moveTo(x*cellSize,0);ctx.lineTo(x*cellSize,gH*cellSize);ctx.stroke();}
  for(let y=0;y<=gH;y++){ctx.beginPath();ctx.moveTo(0,y*cellSize);ctx.lineTo(gW*cellSize,y*cellSize);ctx.stroke();}
}

function cellAt(e){
  const r=canvas.getBoundingClientRect();
  return{x:Math.floor((e.clientX-r.left)*canvas.width/r.width/cellSize),
         y:Math.floor((e.clientY-r.top)*canvas.height/r.height/cellSize)};
}

function paint(x,y,c){
  if(x<0||x>=gW||y<0||y>=gH)return;
  pixels[y][x]=c;
  if(mirrorH){const m=gW-1-x;if(m!==x)pixels[y][m]=c;}
  if(mirrorV){const m=gH-1-y;if(m!==y)pixels[m][x]=c;}
  if(mirrorH&&mirrorV){const mx=gW-1-x,my=gH-1-y;if(mx!==x&&my!==y)pixels[my][mx]=c;}
}

function fill(sx,sy,tc,fc){
  if(sx<0||sx>=gW||sy<0||sy>=gH||fc===tc)return;
  const st=[[sx,sy]],vis=new Set();
  while(st.length){
    const[cx,cy]=st.pop(),k=cx+','+cy;
    if(cx<0||cx>=gW||cy<0||cy>=gH||vis.has(k)||pixels[cy][cx]!==tc)continue;
    vis.add(k);pixels[cy][cx]=fc;
    st.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
}

function act(e,isStart){
  const{x,y}=cellAt(e);
  if(x<0||x>=gW||y<0||y>=gH)return;
  document.getElementById('coord-lbl').textContent='X:'+x+' Y:'+y;
  const rc=e.button===2;
  if(tool==='eyedrop'){if(pixels[y][x])updateColor(pixels[y][x]);return;}
  if(tool==='fill'&&isStart){saveH();fill(x,y,pixels[y][x],rc?sColor:pColor);drawAll();return;}
  paint(x,y,tool==='eraser'?null:(rc?sColor:pColor));
  drawAll();
}

canvas.addEventListener('mousedown',e=>{e.preventDefault();if(isDown)return;isDown=true;saveH();act(e,true);});
canvas.addEventListener('mousemove',e=>{
  if(isDown)act(e,false);
  const{x,y}=cellAt(e);
  if(x>=0&&x<gW&&y>=0&&y<gH)document.getElementById('coord-lbl').textContent='X:'+x+' Y:'+y;
});
canvas.addEventListener('mouseup',()=>isDown=false);
canvas.addEventListener('mouseleave',()=>isDown=false);
canvas.addEventListener('contextmenu',e=>e.preventDefault());

/* ===== TOOLS ===== */
function setTool(t,btn){
  tool=t;
  document.querySelectorAll('.side-btn[data-tool]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function toggleMirror(a){
  if(a==='h'){mirrorH=!mirrorH;document.getElementById('mh-btn').classList.toggle('active',mirrorH);}
  else{mirrorV=!mirrorV;document.getElementById('mv-btn').classList.toggle('active',mirrorV);}
}
function changeZoom(d){
  zIdx=Math.max(0,Math.min(ZOOMS.length-1,zIdx+d));
  cellSize=ZOOMS[zIdx];
  document.getElementById('zoom-lbl').textContent='×'+cellSize;
  setupCanvas();
}
function resizeCanvas(){
  const nw=Math.max(4,Math.min(128,parseInt(document.getElementById('inp-w').value)||16));
  const nh=Math.max(4,Math.min(128,parseInt(document.getElementById('inp-h').value)||16));
  const old=pixels.map(r=>[...r]);gW=nw;gH=nh;initPx();
  for(let y=0;y<Math.min(old.length,gH);y++)
    for(let x=0;x<Math.min((old[0]||[]).length,gW);x++)
      pixels[y][x]=old[y][x];
  setupCanvas();
}
function clearCanvas(){saveH();initPx();drawAll();}

/* ===== COLOR ===== */
function updateColor(hex){
  pColor=hex;
  document.getElementById('fg-sw').style.background=hex;
  document.getElementById('cwheel').value=hex;
  document.getElementById('hex-in').value=hex;
  document.querySelectorAll('.pc').forEach(el=>el.classList.toggle('sel',el.dataset.c===hex));
}
function fromWheel(v){updateColor(v);}
function fromHex(v){if(/^#[0-9A-Fa-f]{6}$/.test(v)){updateColor(v);document.getElementById('cwheel').value=v;}}
function swapColors(){[pColor,sColor]=[sColor,pColor];updateColor(pColor);document.getElementById('bg-sw').style.background=sColor;}
function addToPalette(){if(!PALETTE.includes(pColor)){PALETTE.push(pColor);buildPalette();}}
function buildPalette(){
  const g=document.getElementById('pal-grid');g.innerHTML='';
  PALETTE.forEach(c=>{
    const el=document.createElement('div');el.className='pc';
    el.style.background=c;el.dataset.c=c;el.title=c;
    if(c===pColor)el.classList.add('sel');
    el.onclick=()=>updateColor(c);
    g.appendChild(el);
  });
}

/* ===== EXPORT ===== */
function exportPNG(){
  const ec=document.createElement('canvas');ec.width=gW;ec.height=gH;
  const ec2=ec.getContext('2d');
  for(let y=0;y<gH;y++)for(let x=0;x<gW;x++){if(pixels[y][x]){ec2.fillStyle=pixels[y][x];ec2.fillRect(x,y,1,1);}}
  const a=document.createElement('a');a.download='pixel-art.png';a.href=ec.toDataURL();a.click();
  toast('EXPORTED! 🎉');
}

/* ===== SAVE/LOAD ===== */
const SLOTS=4;
function getSaves(){try{return JSON.parse(localStorage.getItem('pixelMakerSaves')||'{}');}catch{return {};}}
function setSaves(s){localStorage.setItem('pixelMakerSaves',JSON.stringify(s));}
function slotLabel(i){
  const s=getSaves()[i];
  if(s){const d=new Date(s.ts);return'SLOT '+(i+1)+' · '+s.w+'×'+s.h+' · '+d.toLocaleDateString();}
  return 'SLOT '+(i+1)+' — EMPTY';
}
function saveToSlot(i){
  const s=getSaves();
  s[i]={pixels:JSON.stringify(pixels),w:gW,h:gH,ts:Date.now()};
  setSaves(s);closeSaveModal();toast('SAVED TO SLOT '+(i+1)+'! 💾');
}
function loadFromSlot(i){
  const s=getSaves()[i];if(!s)return;
  gW=s.w;gH=s.h;pixels=JSON.parse(s.pixels);
  document.getElementById('inp-w').value=gW;
  document.getElementById('inp-h').value=gH;
  setupCanvas();goToApp();toast('LOADED SLOT '+(i+1)+'! ✅');
}
function openSaveModal(){
  const ms=document.getElementById('modal-slots');ms.innerHTML='';
  for(let i=0;i<SLOTS;i++){
    const div=document.createElement('div');div.className='modal-slot';
    div.innerHTML='<span>'+slotLabel(i)+'</span><span class="modal-slot-tag">SAVE HERE</span>';
    div.onclick=(idx=>()=>saveToSlot(idx))(i);
    ms.appendChild(div);
  }
  document.getElementById('save-modal').style.display='flex';
}
function closeSaveModal(){document.getElementById('save-modal').style.display='none';}

function toggleLoadSlots(btn){
  const el=document.getElementById('load-slots');
  const showing=el.style.display==='flex';
  el.style.display=showing?'none':'flex';
  if(!showing){
    el.innerHTML='';
    const saves=getSaves();
    for(let i=0;i<SLOTS;i++){
      const div=document.createElement('div');
      const has=!!saves[i];
      div.className='slot-row'+(has?'':' empty');
      div.innerHTML='<span>'+slotLabel(i)+'</span><span class="slot-tag">'+(has?'LOAD':'EMPTY')+'</span>';
      if(has)div.onclick=(idx=>()=>loadFromSlot(idx))(i);
      el.appendChild(div);
    }
  }
}

/* ===== IMPORT ===== */
let _importObjectURL=null;

function triggerImport(){
  const inp=document.getElementById('import-file');
  inp.value=''; // reset so same file can be re-selected
  inp.click();
}

function importImage(e){
  const file=e.target.files[0];
  if(!file){return;}
  if(_importObjectURL){URL.revokeObjectURL(_importObjectURL);}
  _importObjectURL=URL.createObjectURL(file);

  const img=new Image();
  img.onload=()=>{
    // Show size-picker modal
    showImportSizePicker(img);
  };
  img.onerror=()=>{
    toast('ERROR LOADING IMAGE ❌');
    URL.revokeObjectURL(_importObjectURL);
    _importObjectURL=null;
  };
  img.src=_importObjectURL;
}

function showImportSizePicker(img){
  // Remove old picker if any
  const old=document.getElementById('import-modal');
  if(old)old.remove();

  const aspect=img.width/img.height;
  const presets=[
    {label:'16×16',w:16,h:16},
    {label:'32×32',w:32,h:32},
    {label:'48×48',w:48,h:48},
    {label:'64×64',w:64,h:64},
    {label:'ORIGINAL (capped 128)',w:Math.min(img.width,128),h:Math.min(img.height,128)},
  ];

  const overlay=document.createElement('div');
  overlay.id='import-modal';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:600;display:flex;align-items:center;justify-content:center;';

  const box=document.createElement('div');
  box.style.cssText='background:#1a1a2e;border:4px solid #FFD600;padding:24px 28px;min-width:280px;box-shadow:7px 7px 0 #000;display:flex;flex-direction:column;gap:8px;align-items:center;font-family:"Press Start 2P",monospace;';

  const title=document.createElement('div');
  title.textContent='📐 IMPORT SIZE';
  title.style.cssText='color:#FFD600;font-size:10px;text-shadow:2px 2px 0 #000;margin-bottom:6px;';
  box.appendChild(title);

  const info=document.createElement('div');
  info.textContent='ORIGINAL: '+img.width+'×'+img.height;
  info.style.cssText='color:rgba(255,255,255,0.4);font-size:6px;margin-bottom:4px;';
  box.appendChild(info);

  presets.forEach(p=>{
    const btn=document.createElement('button');
    btn.textContent=p.label;
    btn.style.cssText='font-family:"Press Start 2P",monospace;font-size:8px;cursor:pointer;border:none;padding:9px 16px;width:100%;background:#4CAF50;color:#fff;box-shadow:0 4px 0 #388E3C,4px 4px 0 #000;text-shadow:1px 1px 0 rgba(0,0,0,0.4);margin-bottom:2px;transition:filter .1s;';
    btn.onmouseover=()=>btn.style.filter='brightness(1.15)';
    btn.onmouseout=()=>btn.style.filter='';
    btn.onclick=()=>{
      overlay.remove();
      doImport(img,p.w,p.h);
    };
    box.appendChild(btn);
  });

  // Custom size row
  const customRow=document.createElement('div');
  customRow.style.cssText='display:flex;gap:6px;align-items:center;width:100%;margin-top:4px;';
  const cw=document.createElement('input');
  cw.type='number';cw.value=32;cw.min=4;cw.max=128;
  cw.style.cssText='width:54px;background:#0a0a1a;border:2px solid #FFD600;color:#FFD600;font-family:"Press Start 2P",monospace;font-size:7px;padding:4px 5px;text-align:center;';
  const cx=document.createElement('span');cx.textContent='×';cx.style.cssText='color:#FFD600;font-size:8px;';
  const ch=document.createElement('input');
  ch.type='number';ch.value=32;ch.min=4;ch.max=128;
  ch.style.cssText='width:54px;background:#0a0a1a;border:2px solid #FFD600;color:#FFD600;font-family:"Press Start 2P",monospace;font-size:7px;padding:4px 5px;text-align:center;';
  const cb=document.createElement('button');
  cb.textContent='GO';
  cb.style.cssText='font-family:"Press Start 2P",monospace;font-size:7px;cursor:pointer;border:none;padding:6px 10px;background:#FF4DA6;color:#fff;box-shadow:0 3px 0 #C2185B,3px 3px 0 #000;flex:1;';
  cb.onclick=()=>{
    const w=Math.max(4,Math.min(128,parseInt(cw.value)||32));
    const h=Math.max(4,Math.min(128,parseInt(ch.value)||32));
    overlay.remove();
    doImport(img,w,h);
  };
  customRow.appendChild(cw);customRow.appendChild(cx);customRow.appendChild(ch);customRow.appendChild(cb);
  box.appendChild(customRow);

  const cancel=document.createElement('button');
  cancel.textContent='✕ CANCEL';
  cancel.style.cssText='font-family:"Press Start 2P",monospace;font-size:7px;cursor:pointer;border:none;padding:7px 14px;width:100%;margin-top:4px;background:#FF4DA6;color:#fff;box-shadow:0 4px 0 #C2185B,4px 4px 0 #000;';
  cancel.onclick=()=>overlay.remove();
  box.appendChild(cancel);

  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

function doImport(img,w,h){
  const tmp=document.createElement('canvas');
  tmp.width=w;tmp.height=h;
  const tc=tmp.getContext('2d');
  tc.imageSmoothingEnabled=false;
  tc.drawImage(img,0,0,w,h);

  let imgData;
  try{
    imgData=tc.getImageData(0,0,w,h);
  }catch(err){
    toast('IMPORT FAILED: CORS ERROR ❌');
    return;
  }

  gW=w;gH=h;
  initPx();
  const data=imgData.data;
  for(let y=0;y<gH;y++){
    for(let x=0;x<gW;x++){
      const i=(y*gW+x)*4;
      const r=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
      if(a>20){
        pixels[y][x]='#'+[r,g,b].map(n=>n.toString(16).padStart(2,'0')).join('');
      }
    }
  }
  document.getElementById('inp-w').value=gW;
  document.getElementById('inp-h').value=gH;

  if(_importObjectURL){URL.revokeObjectURL(_importObjectURL);_importObjectURL=null;}

  goToApp();
  setupCanvas();
  toast('IMPORTED AS '+w+'×'+h+'! 🖼');
}

function newGame(){initPx();goToApp();setupCanvas();}
function goToApp(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
}
function goToMenu(){
  document.getElementById('start-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
}
function showHowTo(){
  toast('DRAW=PENCIL  FILL=BUCKET  PICK=EYEDROP  RIGHT-CLICK=SECONDARY COLOR');
}

/* ===== TOAST ===== */
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ===== INIT ===== */
buildPalette();updateColor('#FF4DA6');
document.getElementById('bg-sw').style.background=sColor;
</script>
